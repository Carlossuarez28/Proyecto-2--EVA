<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Granja</title>
    <link rel="stylesheet" href="Estilos/estilos.css">
</head>
<body>
    <header>
        <h1>Mi Granja</h1>
        <div class="stats-container">
            <p>Dinero: <span id="dinero">100</span></p>
            <p>Energía: <span id="energia">100</span></p>
        </div>

        <div id="mensaje-sistema"></div>

        <div class="selector-container">
            <label for="selectorSemillas">Semilla a plantar:</label>
            <select id="selectorSemillas">
                <option value="Tomate">Tomate </option>
                <option value="Calabaza">Calabaza </option>
            </select>
        </div>
    </header>

    <div class="contenedor-juego">
        <main id="terreno" class="grid-terreno"></main>
        
        <aside class="panel-lateral">
            <h3>Herramientas</h3>
            <div class="inventario-herramientas">
                <div class="herramienta" title="Azada">⛏️</div>
                <div class="herramienta" title="Regadera">💧</div>
                <div class="herramienta" title="Hoz">🧹</div>
            </div>
        </aside>
    </div>
    
    <button id="botonRecargar">Recargar Semillas</button>
    <script type="module" src="Controladores/controladorPrincipal.js"></script>
</body>
</html>
